<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landlord Login - KyU Rentals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="logo">
      <i class="fa-solid fa-house-chimney"></i>
      KyU Rentals
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
    </div>
  </nav>

  <!-- Login page - same structure as student login but with teal theme -->
  <div class="login-page">
    <div class="login-card">
      <div class="login-icon landlord">
        <i class="fa-solid fa-building"></i>
      </div>
      <h1>Landlord Login</h1>
      <p class="login-subtitle">Sign in to manage your rental properties</p>

      <!-- Login form -->
      <form id="landlordLoginForm" class="login-form">
        <div class="login-field">
          <label for="landlordEmail">Email Address</label>
          <div class="input-icon">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="landlordEmail" placeholder="you@example.com" required>
          </div>
        </div>
        <div class="login-field">
          <label for="landlordPassword">Password</label>
          <div class="input-icon">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="landlordPassword" placeholder="Enter your password" required>
          </div>
        </div>
        <div class="login-options">
          <label class="remember-me">
            <input type="checkbox"> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <button type="submit" class="login-btn landlord-btn">
          <i class="fa-solid fa-right-to-bracket"></i> Sign In
        </button>
      </form>

      <div class="login-divider"><span>or</span></div>

      <!-- Signup form - hidden by default, has extra phone field for landlords -->
      <form id="landlordSignupForm" class="login-form" style="display: none;">
        <div class="login-field">
          <label for="landlordSignupName">Full Name</label>
          <div class="input-icon">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="landlordSignupName" placeholder="Jane Doe" required>
          </div>
        </div>
        <div class="login-field">
          <label for="landlordSignupEmail">Email Address</label>
          <div class="input-icon">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="landlordSignupEmail" placeholder="you@example.com" required>
          </div>
        </div>
        <!-- Extra field: landlords need a phone number for student enquiries -->
        <div class="login-field">
          <label for="landlordSignupPhone">Phone Number</label>
          <div class="input-icon">
            <i class="fa-solid fa-phone"></i>
            <input type="tel" id="landlordSignupPhone" placeholder="+254 712 345 678" required>
          </div>
        </div>
        <div class="login-field">
          <label for="landlordSignupPassword">Password</label>
          <div class="input-icon">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="landlordSignupPassword" placeholder="Create a password" required>
          </div>
        </div>
        <button type="submit" class="login-btn landlord-btn">
          <i class="fa-solid fa-user-plus"></i> Create Account
        </button>
      </form>

      <p class="login-toggle">
        <span id="toggleText">Don't have an account?</span>
        <a href="#" id="toggleAuth">Sign Up</a>
      </p>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; 2026 KyU Rentals. Built for students, by students.</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
