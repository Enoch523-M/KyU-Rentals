<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Listings - KyU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar with user info slot for logged-in name + logout -->
  <nav class="navbar">
    <a href="index.html" class="logo">
      <i class="fa-solid fa-house-chimney"></i>
      KyU
    </a>
    <div class="nav-links">
      <a href="student.html" class="active">Browse Listings</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>Available Rentals</h1>
      <p>Find your next home near campus</p>
    </div>

    <!-- Search & filter bar - each input triggers filtering in app.js -->
    <div class="search-filter-bar">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search by name or location...">
      </div>
      <!-- Option values use "min-max" format, parsed by JS with .split('-') -->
      <select class="filter-select" id="priceFilter">
        <option value="">All Prices</option>
        <option value="0-8000">Under KSh 8,000</option>
        <option value="8000-15000">KSh 8,000 - 15,000</option>
        <option value="15000-25000">KSh 15,000 - 25,000</option>
        <option value="25000-100000">Above KSh 25,000</option>
      </select>
      <select class="filter-select" id="distanceFilter">
        <option value="">Any Distance</option>
        <option value="0-1">Within 1 km</option>
        <option value="1-3">1 - 3 km</option>
        <option value="3-5">3 - 5 km</option>
        <option value="5-100">5+ km</option>
      </select>
      <select class="filter-select" id="roomTypeFilter">
        <option value="">Any Room Type</option>
        <option value="Bedsitter">Bedsitter</option>
        <option value="Single Room">Single Room</option>
        <option value="Double Room">Double Room</option>
        <option value="1 Bedroom">1 Bedroom</option>
      </select>
    </div>

    <!-- These empty divs are JS render targets - app.js fills them dynamically -->
    <div class="amenity-filters" id="amenityFilters"></div>
    <div class="results-count" id="resultsCount"></div>
    <div class="listings-grid" id="listingsGrid"></div>
  </div>

  <footer class="footer">
    <p>&copy; 2026 KyU. Built for students, by students.</p>
  </footer>

  <!-- data.js MUST load before app.js (app.js uses the listings array from data.js) -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
